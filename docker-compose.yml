version: "3.8"

# Local development / testing stack for Vault
# Usage: docker-compose up -d

services:
  vault:
    image: hashicorp/vault:1.15.4
    container_name: vault-dev
    restart: unless-stopped
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "root"
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
      VAULT_ADDR: "http://127.0.0.1:8200"
      VAULT_LOG_LEVEL: "info"
    cap_add:
      - IPC_LOCK
    volumes:
      - vault-data:/vault/data
      - ./configs:/vault/config:ro
      - ./policies:/vault/policies:ro
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  vault-init:
    image: hashicorp/vault:1.15.4
    container_name: vault-init
    depends_on:
      vault:
        condition: service_healthy
    environment:
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: "root"
    entrypoint: /bin/sh
    command:
      - -c
      - |
        set -e
        echo "==> Enabling KV v2 secrets engine..."
        vault secrets enable -path=secret kv-v2 2>/dev/null || true

        echo "==> Writing policies..."
        for f in /vault/policies/*.hcl; do
          name=$$(basename $$f .hcl)
          vault policy write $$name $$f
          echo "    Policy '$$name' written."
        done

        echo "==> Enabling AppRole auth..."
        vault auth enable approle 2>/dev/null || true

        echo "==> Writing sample secrets..."
        vault kv put secret/dev/database \
          username="dev-user" \
          password="dev-password-$(date +%s)"

        vault kv put secret/dev/api \
          key="dev-api-key-$(date +%s)"

        echo "==> Dev Vault configured successfully."
    volumes:
      - ./policies:/vault/policies:ro

volumes:
  vault-data:
    driver: local
